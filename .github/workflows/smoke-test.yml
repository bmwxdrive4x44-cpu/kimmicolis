name: Smoke Test CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: swiftcolis
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d swiftcolis"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/swiftcolis?schema=public' }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-nextauth-secret-not-for-prod' }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci --include=optional || {
            echo "npm ci failed, fallback to npm install"
            npm install --no-audit --no-fund
          }

      - name: Prepare database schema
        run: npx prisma migrate deploy || npx prisma db push

      - name: Build application
        run: npm run build

      - name: Start production server
        run: |
          npm run start > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          sleep 3
        env:
          NODE_ENV: production

      - name: Wait for server to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000/api/seed 2>/dev/null || curl -f http://localhost:3000 2>/dev/null; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Waiting for server... (attempt $i/30)"
            sleep 2
          done
          echo "Server failed to start"
          cat /tmp/server.log
          exit 1

      - name: Run smoke tests (CI mode)
        id: smoke
        run: bash ./smoke-test.sh --base-url http://localhost:3000 --ci --strict --report smoke-test-report.json
        continue-on-error: true

      - name: Parse test results
        if: always()
        id: parse
        run: |
          if [ -f smoke-test-report.json ]; then
            TOTAL=$(jq '.totals.total' smoke-test-report.json)
            PASS=$(jq '.totals.pass' smoke-test-report.json)
            FAIL=$(jq '.totals.fail' smoke-test-report.json)
            SKIP=$(jq '.totals.skip' smoke-test-report.json)
            
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "pass=$PASS" >> $GITHUB_OUTPUT
            echo "fail=$FAIL" >> $GITHUB_OUTPUT
            echo "skip=$SKIP" >> $GITHUB_OUTPUT
            
            # Report to CI
            echo "## 🧪 Smoke Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ PASS | $PASS |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ FAIL | $FAIL |" >> $GITHUB_STEP_SUMMARY
            echo "| ⏭️  SKIP | $SKIP |" >> $GITHUB_STEP_SUMMARY
            echo "| 📊 Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            
            if [ "$FAIL" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Failed Checks" >> $GITHUB_STEP_SUMMARY
              jq '.failedChecks[]' smoke-test-report.json >> $GITHUB_STEP_SUMMARY || true
            fi
          fi

      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔴 Smoke Test Failed\n\n';
            if (fs.existsSync('smoke-test-report.json')) {
              const report = JSON.parse(fs.readFileSync('smoke-test-report.json', 'utf8'));
              comment += `**Results:** ${report.totals.pass}/${report.totals.total} PASS, ${report.totals.fail} FAIL, ${report.totals.skip} SKIP\n\n`;
              if (report.failedChecks && report.failedChecks.length > 0) {
                comment += '**Failed Checks:**\n';
                report.failedChecks.forEach(check => {
                  comment += `- ${check}\n`;
                });
              }
            } else {
              comment += 'Could not parse test results. See logs for details.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        run: |
          payload=$(cat <<'JSON'
          {
            "text": "Smoke Test Failed on ${{ github.repository }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Smoke Test Failure*\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "Results:\n• PASS: ${{ steps.parse.outputs.pass }}\n• FAIL: ${{ steps.parse.outputs.fail }}\n• SKIP: ${{ steps.parse.outputs.skip }}"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Workflow"
                    },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }
          JSON
          )
          curl -X POST -H "Content-type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"

      - name: Fail workflow if tests failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: smoke-test-report.json
          retention-days: 30

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) 2>/dev/null || true
          fi
